<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FHE Password Breach Detection</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 56px 20px;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 1.05rem;
      color: #888;
      margin-bottom: 44px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 600px;
    }

    label { font-size: 1rem; color: #aaa; margin-bottom: 8px; display: block; }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="password"] {
      flex: 1;
      padding: 12px 16px;
      background: #0f1117;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #5b6af0; }

    button {
      padding: 12px 24px;
      background: #5b6af0;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1.05rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover { background: #4a58d8; }
    button:disabled { background: #333; cursor: not-allowed; }

    .spinner {
      display: none;
      margin-top: 28px;
      text-align: center;
      color: #888;
      font-size: 1rem;
    }
    .spinner.show { display: block; }

    .result { margin-top: 28px; display: none; }
    .result.show { display: block; }

    .status-badge {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 22px;
    }
    .status-badge.leaked  { background: #3b1a1a; color: #f87171; border: 1px solid #7f2a2a; }
    .status-badge.safe    { background: #1a3b2a; color: #4ade80; border: 1px solid #2a6b3a; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
    }
    th {
      text-align: left;
      color: #888;
      font-weight: 500;
      padding: 8px 0;
      border-bottom: 1px solid #2a2d3a;
    }
    td { padding: 10px 0; border-bottom: 1px solid #1e2130; }
    td:last-child { text-align: right; color: #aaa; }

    .match-row {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #888;
      text-align: right;
    }
    .match-ok  { color: #4ade80; }
    .match-bad { color: #f87171; }

    .error-msg {
      margin-top: 18px;
      color: #f87171;
      font-size: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <h1>FHE Password Breach Detection</h1>
  <p class="subtitle">완전동형암호(BFV) 기반 비밀번호 유출 탐지</p>

  <div class="card">
    <label for="pw">비밀번호 입력</label>
    <div class="input-row">
      <input type="password" id="pw" placeholder="확인할 비밀번호" />
      <button id="btn" onclick="checkPassword()">검사</button>
    </div>

    <div class="spinner" id="spinner">FHE 연산 중... (수 초 ~ 수십 초 소요)</div>
    <div class="error-msg" id="error"></div>

    <div class="result" id="result">
      <div id="badge" class="status-badge"></div>
      <table>
        <thead>
          <tr>
            <th>방법</th>
            <th>판별</th>
            <th>소요 시간</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="match-row" id="match-row"></div>
    </div>
  </div>

  <script>
    async function checkPassword() {
      const pw = document.getElementById("pw").value.trim();
      if (!pw) return;

      const btn     = document.getElementById("btn");
      const spinner = document.getElementById("spinner");
      const result  = document.getElementById("result");
      const error   = document.getElementById("error");

      btn.disabled = true;
      spinner.classList.add("show");
      result.classList.remove("show");
      error.classList.remove("show");

      try {
        const res = await fetch("/check", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw }),
        });

        if (!res.ok) {
          const detail = (await res.json()).detail || "서버 오류";
          throw new Error(detail);
        }

        const data = await res.json();
        renderResult(data);
      } catch (e) {
        error.textContent = "오류: " + e.message;
        error.classList.add("show");
      } finally {
        btn.disabled = false;
        spinner.classList.remove("show");
      }
    }

    function formatTime(ms) {
      return ms >= 1000 ? (ms / 1000).toFixed(2) + " s" : ms + " ms";
    }

    function renderResult(data) {
      const leaked = data.subtraction.leaked || data.fermat.leaked;
      const badge = document.getElementById("badge");
      badge.textContent = leaked ? "🟠 유출된 비밀번호" : "🟢 안전한 비밀번호";
      badge.className = "status-badge " + (leaked ? "leaked" : "safe");

      const methods = [
        { name: "뺄셈 기반 (N=4096)",        d: data.subtraction },
        { name: "페르마 소정리 (N=8192)",      d: data.fermat      },
      ];

      document.getElementById("tbody").innerHTML = methods.map(m => `
        <tr>
          <td>${m.name}</td>
          <td>${m.d.leaked ? "🟠 유출" : "🟢 안전"}</td>
          <td>${formatTime(m.d.ms)}</td>
        </tr>
      `).join("");

      const matchRow = document.getElementById("match-row");
      matchRow.innerHTML = data.match
        ? '<span class="match-ok">두 방법 결과 일치 ✓</span>'
        : '<span class="match-bad">두 방법 결과 불일치 ✗</span>';

      document.getElementById("result").classList.add("show");
    }

    document.getElementById("pw").addEventListener("keydown", e => {
      if (e.key === "Enter") checkPassword();
    });
  </script>
</body>
</html>
